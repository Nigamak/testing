name = Python Build and Test

on:
  push: 
    branches: [ main ]
  pull_request:
    braches: [ main ]


jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with 
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt
      
      - name: Run test
        run: pytest test_app.py -v